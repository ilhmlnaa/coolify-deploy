name: Deploy with Cloudflare Bot Fight Mode Bypass
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: ilhmlnaa/coolify-deploy@v1
        with:
          coolify_webhook_url: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          coolify_token: ${{ secrets.COOLIFY_TOKEN }}
          cloudflare_api_token: ${{ secrets.CF_API_TOKEN }}
          cloudflare_zone_id: ${{ secrets.CF_ZONE_ID }}
          # Bot Fight Mode is auto-disabled before deploy and re-enabled after
          # via the action's post step (always runs, even on failure)
          propagation_delay: '20'
