name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build & Verify dist/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [ "$(git diff --ignore-space-at-eol --text dist/ | wc -l)" -gt "0" ]; then
            echo "❌ dist/ is out of date. Run 'npm run build' and commit the changes."
            git diff
            exit 1
          fi
          echo "✅ dist/ is up to date"

  action-self-test:
    name: Self-test action metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action.yml
        run: |
          test -f action.yml
          test -f dist/main/index.js
          test -f dist/post/index.js
          echo "✅ Action files exist"
